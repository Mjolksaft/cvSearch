<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; margin: 10px; font-family: Arial, sans-serif; }
    button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; background: #0a66c2; color: #fff; border: none; border-radius: 4px; }
    button:hover { background: #004182; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin-top: 10px; padding: 8px; background: #f3f3f3; border-radius: 4px; word-wrap: break-word; }
  </style>
</head>
<body>
  <div style="margin-bottom: 8px;">
    <label for="jobCount" style="font-size: 13px; display: block; margin-bottom: 4px;">Jobs to find:</label>
    <input type="number" id="jobCount" value="10" min="1" max="50"
           style="width: 100%; padding: 6px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
  </div>
  <button id="checkBtn">Find Jobs on LinkedIn</button>
  <div id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
