<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Search — Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-briefcase-fill"></i> CV Search
            </a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/jobs"><i class="bi bi-list-ul"></i> Jobs</a>
                <a class="nav-link" href="/profile"><i class="bi bi-person-circle"></i> Profile</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form method="get" action="/jobs" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Company</label>
                        <input type="text" class="form-control" name="company" th:value="${filterCompany}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" th:value="${filterTitle}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status">
                            <option value="">All</option>
                            <option value="Fetched" th:selected="${filterStatus == 'Fetched'}">Fetched</option>
                            <option value="Applied" th:selected="${filterStatus == 'Applied'}">Applied</option>
                            <option value="Interview" th:selected="${filterStatus == 'Interview'}">Interview</option>
                            <option value="Rejected" th:selected="${filterStatus == 'Rejected'}">Rejected</option>
                            <option value="Offer" th:selected="${filterStatus == 'Offer'}">Offer</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" name="location" th:value="${filterLocation}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search"></i> Search
                        </button>
                        <a href="/jobs" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <span class="text-muted" th:text="'Showing ' + ${#lists.size(jobs)} + ' of ' + ${totalElements} + ' jobs'"></span>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <button id="linkedinCrawlBtn" class="btn btn-sm btn-outline-linkedin">
                    <i class="bi bi-linkedin"></i> Find jobs on LinkedIn
                </button>
                <div class="btn-group btn-group-sm">
                    <a th:href="@{/jobs(saved=true, page=0, size=${pageSize})}" class="btn btn-outline-warning">
                        <i class="bi bi-bookmark-fill"></i> Saved
                    </a>
                    <a href="/jobs" class="btn btn-outline-secondary">
                        <i class="bi bi-eye"></i> All
                    </a>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 40px;"></th>
                            <th>Title</th>
                            <th>Company</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Type</th>
                            <th>Applied</th>
                            <th style="width: 50px;"></th>
                            <th style="width: 70px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}" th:class="${job.saved()} ? 'table-warning' : ''">
                            <td class="text-center">
                                <i th:if="${job.saved()}" class="bi bi-bookmark-fill text-warning"></i>
                            </td>
                            <td>
                                <a th:href="@{'/jobs/' + ${job.id()}}" class="text-decoration-none fw-medium"
                                   th:text="${job.title()}">Title</a>
                            </td>
                            <td th:text="${job.companyName()}">Company</td>
                            <td th:text="${job.location()} ?: '-'">Location</td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${job.status() == 'Fetched' ? 'bg-secondary' : 
                                                       job.status() == 'Applied' ? 'bg-primary' : 
                                                       job.status() == 'Interview' ? 'bg-info' : 
                                                       job.status() == 'Rejected' ? 'bg-danger' : 
                                                       job.status() == 'Offer' ? 'bg-success' : 'bg-secondary'}"
                                      th:text="${job.status()}">Status</span>
                            </td>
                            <td th:text="${job.employmentType()} ?: '-'">Type</td>
                            <td th:text="${#temporals.format(job.appliedDate(), 'yyyy-MM-dd')}">Date</td>
                            <td>
                                <button class="btn btn-sm bookmark-btn"
                                        th:classappend="${job.saved()} ? 'btn-warning' : 'btn-outline-warning'"
                                        th:data-job-id="${job.id()}"
                                        th:data-saved="${job.saved()}"
                                        title="Bookmark">
                                    <i class="bi bi-bookmark" th:classappend="${job.saved()} ? 'bi-bookmark-fill' : 'bi-bookmark'"></i>
                                </button>
                            </td>
                            <td>
                                <a th:if="${job.website()}" th:href="${job.website()}" target="_blank" rel="noopener noreferrer"
                                   class="btn btn-sm btn-success">
                                    <i class="bi bi-box-arrow-up-right"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(jobs)}">
                            <td colspan="9" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                No jobs found
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/jobs(page=${currentPage - 1}, size=${pageSize}, company=${filterCompany}, title=${filterTitle}, status=${filterStatus}, location=${filterLocation}, saved=${filterSaved})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/jobs(page=${i}, size=${pageSize}, company=${filterCompany}, title=${filterTitle}, status=${filterStatus}, location=${filterLocation}, saved=${filterSaved})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/jobs(page=${currentPage + 1}, size=${pageSize}, company=${filterCompany}, title=${filterTitle}, status=${filterStatus}, location=${filterLocation}, saved=${filterSaved})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const linkedinBtn = document.getElementById("linkedinCrawlBtn");

        linkedinBtn.addEventListener("click", () => {
            const count = prompt("How many jobs would you like to find?", "10");
            if (count === null) return; // user cancelled
            const jobCount = parseInt(count, 10);
            if (isNaN(jobCount) || jobCount < 1) {
                alert("Please enter a valid number.");
                return;
            }
            linkedinBtn.disabled = true;
            linkedinBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';
            window.postMessage({ type: "CRAWL_LINKEDIN", count: jobCount }, "*");
        });

        window.addEventListener("message", (event) => {
            if (event.data?.type === "CRAWL_LINKEDIN_DONE") {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
