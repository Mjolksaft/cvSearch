services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: cvsearch
      POSTGRES_USER: cvsearch
      POSTGRES_PASSWORD: cvsearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cvsearch
      SPRING_DATASOURCE_USERNAME: cvsearch
      SPRING_DATASOURCE_PASSWORD: cvsearch
    depends_on:
      - db
volumes:
  pgdata:
